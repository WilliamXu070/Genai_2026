<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Harmonic Motion Visualizer</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <h1>Simple Harmonic Motion (SHM)</h1>
      <p class="subtitle">Analytical spring-mass motion using x(t) = A cos(ωt + φ).</p>

      <section class="panel">
        <div class="controls">
          <button id="toggle-sim">Start / Stop</button>
          <button id="reset-sim">Reset</button>
        </div>
        <div class="readouts">
          <span>Position: <strong id="pos-readout">0.00</strong></span>
          <span>Velocity: <strong id="vel-readout">0.00</strong></span>
          <span>KE: <strong id="ke-readout">0.00</strong></span>
          <span>PE: <strong id="pe-readout">0.00</strong></span>
          <span>Total Energy: <strong id="energy-readout">0.00</strong></span>
        </div>
      </section>

      <section class="viz-wrap">
        <canvas id="shm-canvas" width="980" height="300"></canvas>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
