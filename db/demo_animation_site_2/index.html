<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotating Box Physics Demo</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 30% 20%, #f5fbff, #dce8f5 60%, #c8d8ec);
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: #0e2238;
      }

      .stage {
        width: min(92vw, 760px);
        display: grid;
        gap: 14px;
        justify-items: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.1rem, 2.1vw, 1.5rem);
        letter-spacing: 0.02em;
      }

      .hud {
        display: flex;
        gap: 12px;
        font-size: 0.95rem;
        flex-wrap: wrap;
        justify-content: center;
      }

      .chip {
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(80, 110, 145, 0.28);
        border-radius: 999px;
        padding: 6px 12px;
      }

      canvas {
        width: min(84vw, 620px);
        height: min(84vw, 620px);
        background: linear-gradient(160deg, #ecf5ff, #d9e8fb);
        border: 1px solid #9ab5d4;
        border-radius: 14px;
        box-shadow: 0 20px 40px rgba(29, 54, 82, 0.14);
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <h1 id="title">Ball Physics Inside Rotating Square</h1>
      <div class="hud">
        <span class="chip" id="speed-readout">Speed: 0.00</span>
        <span class="chip" id="angle-readout">Rotation: 0.0°</span>
        <span class="chip" id="energy-readout">Energy: 0.00</span>
      </div>
      <canvas id="sim" width="620" height="620" aria-label="Physics simulation canvas"></canvas>
    </main>

    <script>
      const canvas = document.getElementById("sim");
      const ctx = canvas.getContext("2d");
      const speedReadout = document.getElementById("speed-readout");
      const angleReadout = document.getElementById("angle-readout");
      const energyReadout = document.getElementById("energy-readout");

      const world = {
        centerX: canvas.width / 2,
        centerY: canvas.height / 2,
        boxHalfSize: 220,
        angle: 0,
        angularVelocity: 0.44,
        gravity: 790,
        restitution: 0.91,
        friction: 0.996,
        airDrag: 0.999
      };

      const ball = {
        x: world.centerX + 50,
        y: world.centerY - 95,
        vx: 140,
        vy: 20,
        radius: 20,
        color: "#f45f6f"
      };

      function toLocal(px, py, angle) {
        const dx = px - world.centerX;
        const dy = py - world.centerY;
        const c = Math.cos(angle);
        const s = Math.sin(angle);
        return { x: c * dx + s * dy, y: -s * dx + c * dy };
      }

      function toWorld(px, py, angle) {
        const c = Math.cos(angle);
        const s = Math.sin(angle);
        return {
          x: world.centerX + c * px - s * py,
          y: world.centerY + s * px + c * py
        };
      }

      function drawRotatingSquare() {
        ctx.save();
        ctx.translate(world.centerX, world.centerY);
        ctx.rotate(world.angle);
        const side = world.boxHalfSize * 2;
        ctx.fillStyle = "rgba(75, 115, 170, 0.08)";
        ctx.fillRect(-world.boxHalfSize, -world.boxHalfSize, side, side);
        ctx.strokeStyle = "#3466a2";
        ctx.lineWidth = 6;
        ctx.strokeRect(-world.boxHalfSize, -world.boxHalfSize, side, side);
        ctx.restore();
      }

      function drawBall() {
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        ctx.fillStyle = ball.color;
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#8e2330";
        ctx.stroke();
      }

      function resolveCollision(dt) {
        const localPos = toLocal(ball.x, ball.y, world.angle);
        const localVel = toLocal(ball.x + ball.vx * dt, ball.y + ball.vy * dt, world.angle);
        let vxLocal = (localVel.x - localPos.x) / dt;
        let vyLocal = (localVel.y - localPos.y) / dt;
        let collided = false;
        const max = world.boxHalfSize - ball.radius;

        if (localPos.x > max) {
          localPos.x = max;
          vxLocal = -Math.abs(vxLocal) * world.restitution;
          vyLocal *= world.friction;
          collided = true;
        } else if (localPos.x < -max) {
          localPos.x = -max;
          vxLocal = Math.abs(vxLocal) * world.restitution;
          vyLocal *= world.friction;
          collided = true;
        }

        if (localPos.y > max) {
          localPos.y = max;
          vyLocal = -Math.abs(vyLocal) * world.restitution;
          vxLocal *= world.friction;
          collided = true;
        } else if (localPos.y < -max) {
          localPos.y = -max;
          vyLocal = Math.abs(vyLocal) * world.restitution;
          vxLocal *= world.friction;
          collided = true;
        }

        const worldPos = toWorld(localPos.x, localPos.y, world.angle);
        const worldVel = toWorld(localPos.x + vxLocal * dt, localPos.y + vyLocal * dt, world.angle);
        ball.x = worldPos.x;
        ball.y = worldPos.y;
        ball.vx = (worldVel.x - worldPos.x) / dt;
        ball.vy = (worldVel.y - worldPos.y) / dt;

        if (collided) {
          ball.vx += Math.cos(world.angle + Math.PI / 2) * world.angularVelocity * 42;
          ball.vy += Math.sin(world.angle + Math.PI / 2) * world.angularVelocity * 42;
        }
      }

      let last = performance.now();

      function tick(now) {
        const dt = Math.min(0.033, (now - last) / 1000);
        last = now;

        world.angle += world.angularVelocity * dt;
        ball.vy += world.gravity * dt;
        ball.vx *= world.airDrag;
        ball.vy *= world.airDrag;
        ball.x += ball.vx * dt;
        ball.y += ball.vy * dt;

        resolveCollision(dt);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawRotatingSquare();
        drawBall();

        const speed = Math.hypot(ball.vx, ball.vy);
        const kinetic = 0.5 * speed * speed;
        speedReadout.textContent = `Speed: ${speed.toFixed(2)}`;
        angleReadout.textContent = `Rotation: ${((world.angle * 180) / Math.PI).toFixed(1)}°`;
        energyReadout.textContent = `Energy: ${kinetic.toFixed(2)}`;

        requestAnimationFrame(tick);
      }

      requestAnimationFrame(tick);
    </script>
  </body>
</html>
