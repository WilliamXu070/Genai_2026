<!doctype html><html><head><meta charset='UTF-8'><style>body{font-family:Arial;padding:24px}#box{width:80px;height:80px;background:#2d7;transition:transform .6s ease,background-color .6s ease}#box.animate{transform:translateX(240px);background:#f53}#status{font-weight:700;margin-top:8px}</style></head><body><h1 id='title'>Button Animation Validation</h1><button id='run-animation'>Run animation</button><div id='box'></div><p id='status'>idle</p><script>const b=document.getElementById('run-animation');const box=document.getElementById('box');const s=document.getElementById('status');b.addEventListener('click',()=>{s.textContent='running';box.classList.add('animate');setTimeout(()=>{s.textContent='completed';},700);});</script></body></html>
